<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy 2nd Anniversary! ❤️</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        :root {
            --pink: #ff4d6d;
            --dark-pink: #c9184a;
            --gold: #ffb703;
            --white-overlay: rgba(255, 255, 255, 0.88);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', cursive, sans-serif;
            overflow-x: hidden;
            text-align: center;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            background-color: #fce4ec;
        }

        /* --- Background with Faded Image --- */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            /* Lassan romantic background image ekak */
            background-image: url('https://images.unsplash.com/photo-1518199266791-5375a83190b7?w=1000');
            background-size: cover;
            background-position: center;
            z-index: -2;
        }

        body::after {
            content: "";
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: var(--white-overlay);
            z-index: -1;
        }

        /* --- Gift Box Section --- */
        #gift-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: var(--pink);
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 1.2s cubic-bezier(0.9, 0, 0.1, 1);
        }

        .ribbon-v { position: absolute; width: 70px; height: 100%; background: var(--gold); box-shadow: 0 0 20px rgba(0,0,0,0.2); }
        .ribbon-h { position: absolute; width: 100%; height: 70px; background: var(--gold); box-shadow: 0 0 20px rgba(0,0,0,0.2); }

        .tap-circle {
            width: 140px; height: 140px;
            background: white;
            border-radius: 50%;
            z-index: 1001;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            border: 8px solid var(--gold);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .unlocked #gift-overlay { transform: translateY(100%); }

        /* --- Main Content --- */
        .card-content {
            padding: 40px 15px;
            width: 100%;
            max-width: 450px;
            opacity: 0;
            transition: opacity 1s 0.5s;
        }

        .unlocked .card-content { opacity: 1; }

        h1 { color: var(--dark-pink); font-size: 2.2rem; margin-bottom: 20px; }

        /* Quote and Hero Image Section */
        .hero-section {
            margin-bottom: 30px;
        }

        .hero-img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            border: 4px solid white;
        }

        .quote-box {
            margin: 15px 0;
            font-style: italic;
            color: #555;
            font-size: 1.1rem;
            line-height: 1.5;
            padding: 0 10px;
        }

        /* --- Fixed Calendar --- */
        .calendar-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            overflow: hidden;
            border: 2px solid var(--pink);
            margin-bottom: 30px;
        }

        .cal-header { background: var(--pink); color: white; padding: 12px; font-weight: bold; }
        
        .cal-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            padding: 10px;
        }

        .day-label { font-weight: bold; color: var(--pink); font-size: 0.8rem; padding: 5px 0; }
        .date { padding: 12px 0; font-size: 0.9rem; position: relative; color: #333; }
        
        .marked { color: white !important; font-weight: bold; }
        .marked::before {
            content: '❤️';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 2.8rem;
            z-index: -1;
        }

        /* --- Photo Gallery --- */
        .gallery-scroll {
            display: flex;
            overflow-x: auto;
            gap: 15px;
            padding: 10px 0;
            scrollbar-width: none;
        }

        .photo-card {
            flex: 0 0 240px;
            background: white;
            padding: 8px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
            transform: rotate(var(--r));
        }

        .photo-card img { width: 100%; height: 250px; object-fit: cover; border-radius: 5px; }

        .footer-wish { margin: 30px 0; font-weight: bold; color: var(--dark-pink); }

        .heart { position: fixed; color: var(--pink); z-index: 1; pointer-events: none; }
    </style>
</head>
<body>

    <div id="gift-overlay" onclick="openCard()">
        <div class="ribbon-v"></div>
        <div class="ribbon-h"></div>
        <div class="tap-circle">
            <span style="font-weight: bold; color: var(--dark-pink);">TAP TO OPEN</span>
            <div style="font-size: 40px;">🎁</div>
        </div>
    </div>

    <div class="card-content">
        <h1>Happy 2nd Anniversary!</h1>

        <div class="hero-section">
            <img src="https://images.unsplash.com/photo-1519741497674-611481863552?w=600" class="hero-img" alt="Love Photo">
            <div class="quote-box">
                "Two years of love, laughter, and beautiful memories. I’m so lucky to have you by my side. ❤️"
            </div>
        </div>

        <div class="calendar-card">
            <div class="cal-header">March 2026</div>
            <div class="cal-grid">
                <div class="day-label">S</div><div class="day-label">M</div><div class="day-label">T</div><div class="day-label">W</div><div class="day-label">T</div><div class="day-label">F</div><div class="day-label">S</div>
                
                <span class="date">1</span><span class="date">2</span><span class="date">3</span><span class="date">4</span><span class="date">5</span><span class="date">6</span><span class="date">7</span>
                <span class="date">8</span><span class="date">9</span><span class="date">10</span><span class="date">11</span><span class="date">12</span><span class="date">13</span>
                <span class="date marked">14</span> <span class="date">15</span><span class="date">16</span><span class="date">17</span><span class="date">18</span><span class="date">19</span><span class="date">20</span><span class="date">21</span>
                <span class="date">22</span><span class="date">23</span><span class="date">24</span><span class="date">25</span><span class="date">26</span><span class="date">27</span><span class="date">28</span>
                <span class="date">29</span><span class="date">30</span><span class="date">31</span>
            </div>
        </div>

        <div class="gallery-scroll">
            <div class="photo-card" style="--r: -2deg;"><img src="https://images.unsplash.com/photo-1511795409834-ef04bbd61622?w=400"><p>Day 01</p></div>
            <div class="photo-card" style="--r: 2deg;"><img src="https://images.unsplash.com/photo-1494774157365-9e04c6720e47?w=400"><p>Laughter</p></div>
            <div class="photo-card" style="--r: -1deg;"><img src="https://images.unsplash.com/photo-1515934751635-c81c6bc9a2d8?w=400"><p>Forever</p></div>
        </div>

        <div class="footer-wish">
            <p><strong>With Love, <br> Your Wifey ❤️</strong></p>
        </div>
    </div>

    <script>
        function openCard() {
            document.body.classList.add('unlocked');

            // Confetti
            var end = Date.now() + (4 * 1000);
            (function frame() {
              confetti({ particleCount: 3, angle: 60, spread: 55, origin: { x: 0 } });
              confetti({ particleCount: 3, angle: 120, spread: 55, origin: { x: 1 } });
              if (Date.now() < end) { requestAnimationFrame(frame); }
            }());

            setInterval(createHeart, 400);
        }

        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.fontSize = (Math.random() * 10 + 15) + 'px';
            document.body.appendChild(heart);

            let pos = 0;
            const id = setInterval(() => {
                if (pos > 1000) { clearInterval(id); heart.remove(); }
                else { pos += 1.5; heart.style.top = 100 - (pos/10) + 'vh'; }
            }, 10);
        }
    </script>
</body>
</html>
