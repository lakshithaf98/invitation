<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy 2nd Anniversary!</title>
    <style>
        :root {
            --pink: #ff4d6d;
            --gold: #ffb703;
            --white: #fff5f5;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Segoe UI', cursive, sans-serif;
            background: #ffe5ec;
            overflow-x: hidden;
        }

        /* --- Gift Wrap & Ribbon Section --- */
        #gift-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: var(--pink);
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 1s cubic-bezier(0.7, 0, 0.3, 1);
        }

        .ribbon-v {
            position: absolute;
            width: 60px; height: 100%;
            background: var(--gold);
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
        }

        .ribbon-h {
            position: absolute;
            width: 100%; height: 60px;
            background: var(--gold);
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
        }

        .tap-circle {
            width: 120px; height: 120px;
            background: var(--white);
            border-radius: 50%;
            z-index: 1001;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            border: 5px solid var(--gold);
            animation: pulse 1.5s infinite;
            text-align: center;
            font-weight: bold;
            color: var(--pink);
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        /* --- Main Card Content --- */
        .card-content {
            padding: 20px;
            text-align: center;
            opacity: 0;
            transition: 1s;
        }

        h1 { color: var(--pink); font-size: 2.5rem; margin-top: 20px; }
        
        /* --- Calendar --- */
        .calendar {
            background: white;
            width: 250px;
            margin: 20px auto;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .cal-header { background: var(--pink); color: white; padding: 10px; font-weight: bold; }
        .cal-body { 
            display: grid; 
            grid-template-columns: repeat(7, 1fr); 
            padding: 15px;
            font-size: 0.9rem;
        }
        .date { padding: 5px; position: relative; }
        .mark { color: white; z-index: 1; }
        .mark::after {
            content: '❤️';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.8rem;
            z-index: -1;
        }

        /* --- Gallery --- */
        .gallery {
            display: flex;
            overflow-x: auto;
            gap: 15px;
            padding: 20px;
            scroll-snap-type: x mandatory;
        }
        .gallery img {
            width: 280px;
            height: 350px;
            object-fit: cover;
            border-radius: 15px;
            border: 5px solid white;
            scroll-snap-align: center;
            flex-shrink: 0;
        }

        /* --- Footer Wish --- */
        .wish {
            font-size: 1.2rem;
            color: #555;
            line-height: 1.6;
            margin: 30px;
            font-style: italic;
        }

        .unlocked #gift-overlay { transform: translateY(-100%); }
        .unlocked .card-content { opacity: 1; }
    </style>
</head>
<body>

    <div id="gift-overlay" onclick="openCard()">
        <div class="ribbon-v"></div>
        <div class="ribbon-h"></div>
        <div class="tap-circle">Tap to Open <br> 🎁</div>
    </div>

    <div class="card-content">
        <h1>Happy 2nd Anniversary!</h1>
        
        <div class="calendar">
            <div class="cal-header">March 2026</div>
            <div class="cal-body">
                <span>S</span><span>M</span><span>T</span><span>W</span><span>T</span><span>F</span><span>S</span>
                <span>1</span><span>2</span><span>3</span><span>4</span><span>5</span><span>6</span><span>7</span>
                <span>8</span><span>9</span><span>10</span><span>11</span><span>12</span><span>13</span>
                <span class="date mark">14</span> <span>15</span><span>16</span><span>17</span><span>18</span><span>19</span><span>20</span><span>21</span>
                <span>22</span><span>23</span><span>24</span><span>25</span><span>26</span><span>27</span><span>28</span>
            </div>
        </div>

        <p class="wish">"Two years of love, laughter, and beautiful memories. <br> Cheers to many more!"</p>

        <div class="gallery">
            <img src="https://images.unsplash.com/photo-1511795409834-ef04bbd61622?w=500" alt="Couple 1">
            <img src="https://images.unsplash.com/photo-1519741497674-611481863552?w=500" alt="Couple 2">
            <img src="https://images.unsplash.com/photo-1515934751635-c81c6bc9a2d8?w=500" alt="Couple 3">
        </div>

        <p style="color: var(--pink); font-weight: bold; margin-bottom: 50px;">Scroll for more photos ➔</p>
    </div>

    <script>
        function openCard() {
            document.body.classList.add('unlocked');
            
            // Podi confetti effect ekak (optional browser alert ekak)
            setTimeout(() => {
                alert("Surprise! ❤️ Happy Anniversary!");
            }, 1000);
        }
    </script>
</body>
</html>
