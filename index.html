<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy 2nd Anniversary! ❤️</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        :root {
            --pink: #ff4d6d;
            --dark-pink: #c9184a;
            --gold: #ffb703;
            --card-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', cursive, sans-serif;
            overflow-x: hidden;
            text-align: center;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            position: relative;
        }

        /* --- Background Image with White Opacity Overlay --- */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            /* MEHATA LASSANA BACKGROUND IMAGE EKAK DANNA */
            background-image: url('https://images.unsplash.com/photo-1518199266791-5375a83190b7?w=1000');
            background-size: cover;
            background-position: center;
            z-index: -2;
        }

        body::after {
            content: "";
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.85); /* White opacity overlay */
            z-index: -1;
        }

        /* --- Gift Wrap Section (Pahalata slide wenna haduwa) --- */
        #gift-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: var(--pink);
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 1.2s cubic-bezier(0.9, 0, 0.1, 1);
        }

        .ribbon-v {
            position: absolute;
            width: 70px; height: 100%;
            background: var(--gold);
            box-shadow: 0 0 20px rgba(0,0,0,0.2);
        }

        .ribbon-h {
            position: absolute;
            width: 100%; height: 70px;
            background: var(--gold);
            box-shadow: 0 0 20px rgba(0,0,0,0.2);
        }

        .tap-circle {
            width: 140px; height: 140px;
            background: white;
            border-radius: 50%;
            z-index: 1001;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            border: 8px solid var(--gold);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            animation: wiggle 2.5s infinite;
        }

        @keyframes wiggle {
            0%, 100% { transform: rotate(0deg) scale(1); }
            10% { transform: rotate(5deg) scale(1.05); }
            20% { transform: rotate(-5deg) scale(1.05); }
            50% { transform: rotate(0deg) scale(1); }
        }

        /* Unlocked state - Pahalata slide wenawa anniversary eka penna */
        .unlocked #gift-overlay {
            transform: translateY(100%); 
        }

        /* --- Main Content --- */
        .card-content {
            padding: 60px 20px;
            width: 100%;
            max-width: 500px;
            opacity: 0;
            transition: opacity 1.5s ease-in;
        }

        .unlocked .card-content {
            opacity: 1;
        }

        h1 {
            color: var(--dark-pink);
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .sub-text {
            color: #ff758f;
            font-size: 1.2rem;
            margin-bottom: 30px;
            font-weight: bold;
        }

        /* --- Calendar --- */
        .calendar-card {
            background: white;
            margin: 0 auto 40px;
            border-radius: 20px;
            box-shadow: var(--card-shadow);
            overflow: hidden;
            border: 3px solid var(--pink);
        }

        .cal-header {
            background: var(--pink);
            color: white;
            padding: 15px;
            font-weight: bold;
        }

        .cal-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            padding: 15px;
        }

        .day-label { font-weight: bold; color: var(--pink); font-size: 0.8rem; }
        .date { padding: 10px; position: relative; }
        
        .marked::before {
            content: '❤';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: var(--pink);
            font-size: 2.5rem;
            z-index: -1;
        }
        .marked { color: white; font-weight: bold; }

        /* --- Gallery --- */
        .gallery-scroll {
            display: flex;
            overflow-x: auto;
            gap: 20px;
            padding: 20px;
            scrollbar-width: none;
        }

        .photo-card {
            flex: 0 0 260px;
            background: white;
            padding: 10px;
            border-radius: 10px;
            box-shadow: var(--card-shadow);
            transform: rotate(var(--r));
        }

        .photo-card img {
            width: 100%;
            height: 300px;
            object-fit: cover;
            border-radius: 5px;
        }

        .footer-message {
            margin: 40px 0;
            padding: 20px;
            background: rgba(255, 255, 255, 0.7);
            border-radius: 15px;
            color: #444;
        }

        .heart {
            position: fixed;
            color: var(--pink);
            z-index: 1;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="gift-overlay" onclick="openCard()">
        <div class="ribbon-v"></div>
        <div class="ribbon-h"></div>
        <div class="tap-circle">
            <span style="font-weight: bold; color: var(--dark-pink);">TAP TO OPEN</span>
            <div style="font-size: 40px;">🎁</div>
        </div>
    </div>

    <div class="card-content">
        <h1>Happy 2nd Anniversary!</h1>
        <p class="sub-text">To my amazing Husband ❤️</p>

        <div class="calendar-card">
            <div class="cal-header">March 2026</div>
            <div class="cal-grid">
                <div class="day-label">S</div><div class="day-label">M</div><div class="day-label">T</div><div class="day-label">W</div><div class="day-label">T</div><div class="day-label">F</div><div class="day-label">S</div>
                <span>1</span><span>2</span><span>3</span><span>4</span><span>5</span><span>6</span><span>7</span>
                <span>8</span><span>9</span><span>10</span><span>11</span><span>12</span><span>13</span>
                <span class="date marked">14</span>
                <span>15</span><span>16</span><span>17</span><span>18</span><span>19</span><span>20</span><span>21</span>
                <span>22</span><span>23</span><span>24</span><span>25</span><span>26</span><span>27</span><span>28</span>
            </div>
        </div>

        <div class="gallery-scroll">
            <div class="photo-card" style="--r: -3deg;"><img src="https://images.unsplash.com/photo-1511795409834-ef04bbd61622?w=500"><p>Memory 1</p></div>
            <div class="photo-card" style="--r: 2deg;"><img src="https://images.unsplash.com/photo-1519741497674-611481863552?w=500"><p>Memory 2</p></div>
            <div class="photo-card" style="--r: -1deg;"><img src="https://images.unsplash.com/photo-1515934751635-c81c6bc9a2d8?w=500"><p>Memory 3</p></div>
        </div>

        <div class="footer-message">
            <p>"Thank you for two incredible years. Cheers to forever!"</p>
            <br>
            <p><strong>Forever Yours, <br> Your Wifey ❤️</strong></p>
        </div>
    </div>

    <script>
        function openCard() {
            document.body.classList.add('unlocked');

            // Confetti effect
            var end = Date.now() + (5 * 1000);
            (function frame() {
              confetti({ particleCount: 3, angle: 60, spread: 55, origin: { x: 0 } });
              confetti({ particleCount: 3, angle: 120, spread: 55, origin: { x: 1 } });
              if (Date.now() < end) { requestAnimationFrame(frame); }
            }());

            setInterval(createHeart, 300);
        }

        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.fontSize = (Math.random() * 10 + 15) + 'px';
            document.body.appendChild(heart);

            let pos = 0;
            const id = setInterval(() => {
                if (pos > 1000) { clearInterval(id); heart.remove(); }
                else { pos += 2; heart.style.top = 100 - (pos/10) + 'vh'; }
            }, 10);
        }
    </script>
</body>
</html>
