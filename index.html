<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy 2nd Anniversary! ❤️</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        :root {
            --pink: #ff4d6d;
            --dark-pink: #c9184a;
            --gold: #ffb703;
            --card-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', cursive, sans-serif;
            overflow-x: hidden;
            text-align: center;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            background-color: #fff;
        }

        /* --- Full Background Image Fix --- */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            /* BACKGROUND PHOTO ID: 1acfIgoow2_9MfZ5HdGbX3glaAAsK72uF */
            background-image: url('https://drive.google.com/uc?export=view&id=1acfIgoow2_9MfZ5HdGbX3glaAAsK72uF');
            background-size: cover;
            background-position: center;
            z-index: -2;
        }

        body::after {
            content: "";
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.6); 
            z-index: -1;
        }

        /* --- Gift Wrap Section --- */
        #gift-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: var(--pink);
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 1.2s cubic-bezier(0.9, 0, 0.1, 1);
        }

        .ribbon-v { position: absolute; width: 70px; height: 100%; background: var(--gold); box-shadow: 0 0 20px rgba(0,0,0,0.2); }
        .ribbon-h { position: absolute; width: 100%; height: 70px; background: var(--gold); box-shadow: 0 0 20px rgba(0,0,0,0.2); }

        .tap-circle {
            width: 140px; height: 140px;
            background: white; border-radius: 50%;
            z-index: 1001; display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            cursor: pointer; border: 8px solid var(--gold);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            animation: wigle 2s infinite;
        }

        @keyframes wigle {
            0% { transform: rotate(0deg) scale(1); }
            10% { transform: rotate(5deg) scale(1.05); }
            20% { transform: rotate(-5deg) scale(1.05); }
            50% { transform: rotate(0deg) scale(1); }
        }

        .unlocked #gift-overlay { transform: translateY(100%); }

        /* --- Main Content --- */
        .card-content {
            padding: 50px 20px;
            width: 100%;
            max-width: 480px;
            opacity: 0;
            transition: opacity 1s;
            z-index: 10;
        }

        .unlocked .card-content { opacity: 1; }

        h1 { color: var(--dark-pink); font-size: 2.5rem; margin-bottom: 20px; text-shadow: 2px 2px white; }

        .quote-container {
            min-height: 80px;
            margin-bottom: 30px;
            background: rgba(255, 255, 255, 0.7);
            padding: 15px;
            border-radius: 15px;
            border-left: 5px solid var(--pink);
        }

        #typing-text { font-style: italic; color: #333; font-size: 1.2rem; line-height: 1.6; display: inline; }

        /* --- Calendar --- */
        .calendar-card {
            background: white;
            border-radius: 20px;
            box-shadow: var(--card-shadow);
            overflow: hidden;
            border: 3px solid var(--pink);
            margin-bottom: 40px;
        }

        .cal-header { background: var(--pink); color: white; padding: 15px; font-weight: bold; }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); padding: 15px; }
        .day-label { font-weight: bold; color: var(--pink); font-size: 0.85rem; padding-bottom: 10px; }
        .date { padding: 12px 0; font-size: 1rem; position: relative; color: #333; }
        
        .marked { color: white !important; z-index: 2; font-weight: bold; }
        .marked::after {
            content: '❤️';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 2.8rem;
            z-index: -1;
        }

        /* --- Auto-Slide Gallery --- */
        .gallery-wrapper {
            width: 100%;
            overflow: hidden;
            margin-bottom: 40px;
            border-radius: 15px;
            position: relative;
        }

        .gallery-scroll {
            display: flex;
            transition: transform 0.8s ease-in-out;
            width: 100%;
        }

        .photo-card {
            flex: 0 0 100%;
            display: flex;
            justify-content: center;
            padding: 20px 0;
        }

        .photo-card img { 
            width: 280px; 
            height: 350px; 
            object-fit: cover; 
            border-radius: 12px; 
            border: 8px solid white;
            box-shadow: var(--card-shadow);
        }

        .footer-message {
            margin: 40px 0;
            font-size: 1.1rem;
            color: var(--dark-pink);
            font-weight: bold;
            background: rgba(255, 255, 255, 0.6);
            padding: 15px;
            border-radius: 10px;
        }

        .heart { position: fixed; color: var(--pink); z-index: 1; pointer-events: none; }
    </style>
</head>
<body>

    <div id="gift-overlay" onclick="openCard()">
        <div class="ribbon-v"></div>
        <div class="ribbon-h"></div>
        <div class="tap-circle">
            <span style="font-weight: bold; color: var(--dark-pink); font-size: 12px;">OPEN SURPRISE</span>
            <div style="font-size: 45px;">🎁</div>
        </div>
    </div>

    <div class="card-content">
        <h1>Happy 2nd Anniversary!</h1>
        <div class="quote-container">
            <span id="typing-text"></span>
        </div>

        <div class="calendar-card">
            <div class="cal-header">March 2026</div>
            <div class="cal-grid">
                <div class="day-label">S</div><div class="day-label">M</div><div class="day-label">T</div><div class="day-label">W</div><div class="day-label">T</div><div class="day-label">F</div><div class="day-label">S</div>
                <span class="date">1</span><span class="date">2</span><span class="date">3</span><span class="date">4</span><span class="date">5</span><span class="date">6</span><span class="date">7</span>
                <span class="date">8</span><span class="date">9</span><span class="date">10</span><span class="date">11</span><span class="date">12</span><span class="date">13</span>
                <span class="date marked">14</span>
                <span class="date">15</span><span class="date">16</span><span class="date">17</span><span class="date">18</span><span class="date">19</span><span class="date">20</span><span class="date">21</span>
            </div>
        </div>

        <div class="gallery-wrapper">
            <div class="gallery-scroll" id="autoGallery">
                <div class="photo-card"><img src="https://drive.google.com/uc?export=view&id=1zibq288QEn_IK48YebJgmXcIvIlk58IE"></div>
                <div class="photo-card"><img src="https://drive.google.com/uc?export=view&id=1K1t-qGSkCxNNGPqvjfmpSbCzx-XaVbJ9"></div>
                <div class="photo-card"><img src="https://drive.google.com/uc?export=view&id=16wjzEXe56uQ_iQpp2CgbS9etpLGGhI5l"></div>
            </div>
        </div>

        <div class="footer-message">
            <p>With Lots of Love, <br> Your Wifey ❤️</p>
        </div>
    </div>

    <script>
        const quote = "Two years of love, laughter, and beautiful memories. I’m so lucky to have you by my side. Cheers to many more! ❤️";
        let index = 0;

        function typeEffect() {
            if (index < quote.length) {
                document.getElementById("typing-text").innerHTML += quote.charAt(index);
                index++;
                setTimeout(typeEffect, 50); 
            }
        }

        let currentSlide = 0;
        function startAutoSlide() {
            const gallery = document.getElementById("autoGallery");
            const slides = document.querySelectorAll(".photo-card");
            setInterval(() => {
                currentSlide = (currentSlide + 1) % slides.length;
                gallery.style.transform = `translateX(-${currentSlide * 100}%)`;
            }, 3000); 
        }

        function openCard() {
            document.body.classList.add('unlocked');
            setTimeout(typeEffect, 1200);
            setTimeout(startAutoSlide, 2000);

            var end = Date.now() + (3 * 1000);
            (function frame() {
              confetti({ particleCount: 2, angle: 60, spread: 55, origin: { x: 0 } });
              confetti({ particleCount: 2, angle: 120, spread: 55, origin: { x: 1 } });
              if (Date.now() < end) { requestAnimationFrame(frame); }
            }());

            setInterval(createHeart, 400);
        }

        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.fontSize = (Math.random() * 10 + 15) + 'px';
            document.body.appendChild(heart);
            let pos = 0;
            const id = setInterval(() => {
                if (pos > 1000) { clearInterval(id); heart.remove(); }
                else { pos += 1.5; heart.style.top = 100 - (pos/10) + 'vh'; }
            }, 10);
        }
    </script>
</body>
</html>
